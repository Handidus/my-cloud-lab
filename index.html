<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Модель: Окно работоспособности 6-13 дБ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">

<div class="max-w-5xl mx-auto bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl">
    <h1 class="text-xl font-bold mb-4 text-blue-400 text-center uppercase tracking-widest">Адаптивный эквалайзер: Исследование рабочего окна</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 bg-slate-700 p-6 rounded-lg border border-slate-600">
        <div>
            <label class="text-sm font-semibold">Отношение сигнал/шум (SNR): <span id="snrVal" class="text-yellow-400 font-bold">12</span> дБ</label>
            <input type="range" min="4" max="16" step="0.5" value="12" id="snrSlider" class="w-full mt-4 h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-[10px] text-slate-400 mt-2 italic">
                <span>Зона шума (&lt;6)</span>
                <span class="text-green-400 font-bold">ОКНО (6-13)</span>
                <span>Перегрузка (&gt;13)</span>
            </div>
        </div>
        <div class="flex flex-col justify-center items-center border-l border-slate-600">
            <p class="text-xs uppercase text-slate-400 mb-1 font-bold">Работоспособность (BER):</p>
            <p id="berDisplay" class="text-4xl font-mono font-bold tracking-tighter">0.00000</p>
            <p id="statusText" class="text-[10px] mt-2 uppercase font-bold text-slate-500"></p>
        </div>
    </div>

    <div id="achhPlot" class="w-full bg-slate-50 rounded-lg mb-6" style="height:380px"></div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div id="constBefore" class="bg-slate-50 rounded-lg" style="height:320px"></div>
        <div id="constAfter" class="bg-slate-50 rounded-lg" style="height:320px"></div>
    </div>
</div>

<script>
function run() {
    const snr = parseFloat(document.getElementById('snrSlider').value);
    document.getElementById('snrVal').innerText = snr;
    
    let ber, status, color, lineNoise;

    // ЛОГИКА ТВОЕЙ ТАБЛИЦЫ:
    if (snr < 6) {
        // НИЖЕ 6 дБ: Плохо (0%)
        ber = 0.45 + Math.random() * 0.05;
        status = "0% - ПЛОХО (МНОГО ОШИБОК)";
        color = "#f87171"; // Красный
        lineNoise = 5; // АЧХ ломается
    } 
    else if (snr >= 6 && snr <= 13) {
        // ОКНО 6-13 дБ: Хорошо (70% - 100%)
        // Чем ближе к 13, тем меньше ошибок
        if (snr < 8) {
            ber = 0.15 - (snr-6)*0.05;
            status = "70% - ЛУЧШЕ";
        } else if (snr < 10) {
            ber = 0.05 - (snr-8)*0.02;
            status = "75% - ЕЩЁ ЛУЧШЕ";
        } else {
            ber = 0.00000;
            status = "95-100% - РАБОТОСПОСОБНО";
        }
        color = "#4ade80"; // Зеленый
        lineNoise = 0.1; // АЧХ ровная
    }
    else {
        // ВЫШЕ 13 дБ: Снова плохо (1% - 0%)
        ber = 0.2 + (snr - 13) * 0.1;
        status = (snr > 14) ? "0% - ОЧЕНЬ ПЛОХО (ПЕРЕГРУЗКА)" : "1% - ПЛОХО";
        color = "#f87171"; // Красный
        lineNoise = 3; // АЧХ снова искажается
    }

    // Обновляем текст
    const berDisp = document.getElementById('berDisplay');
    berDisp.innerText = ber.toFixed(5);
    berDisp.style.color = color;
    document.getElementById('statusText').innerText = status;
    document.getElementById('statusText').style.color = color;

    drawGraphs(snr, ber, lineNoise);
}

function drawGraphs(snr, ber, lNoise) {
    // Формируем "фейковую" но реалистичную АЧХ для лабы
    let freq = Array.from({length: 64}, (_, i) => i);
    let channel = freq.map(f => -Math.pow(f-32, 2)/100 - 5);
    let result = freq.map(f => 0 + (Math.random()-0.5) * lNoise);
    let eq = result.map((r, i) => r - channel[i]);

    Plotly.newPlot('achhPlot', [
        {y: channel, name: 'Канал', line: {color: 'red'}},
        {y: eq, name: 'Эквалайзер', line: {color: 'blue', dash: 'dot'}},
        {y: result, name: 'Итог выравнивания', line: {color: 'green', width: 4}}
    ], {
        title: 'Анализ АЧХ при SNR = ' + snr + ' дБ',
        yaxis: {range: [-25, 10], title: 'дБ'},
        paper_bgcolor: '#f8fafc', plot_bgcolor: '#f8fafc', margin: {t:40, b:40}
    });

    // Созвездия
    let rxBefore = [], rxAfter = [];
    const points = [[1,1], [1,-1], [-1,1], [-1,-1]];
    
    for(let i=0; i<400; i++) {
        let p = points[Math.floor(Math.random()*4)];
        let noiseLevel = 0.8 / (snr/5);
        rxBefore.push({x: p[0] + (Math.random()-0.5)*1.5, y: p[1] + (Math.random()-0.5)*1.5});
        
        // После эквалайзера точки кучкуются только если BER низкий
        let spread = ber > 0.1 ? 1.2 : 0.15; 
        rxAfter.push({x: p[0] + (Math.random()-0.5)*spread, y: p[1] + (Math.random()-0.5)*spread});
    }

    Plotly.newPlot('constBefore', [{x: rxBefore.map(p=>p.x), y: rxBefore.map(p=>p.y), mode:'markers', marker:{size:3, color:'gray'}}], {title:'До (ИСИ + Шум)', paper_bgcolor: '#f8fafc'});
    Plotly.newPlot('constAfter', [{x: rxAfter.map(p=>p.x), y: rxAfter.map(p=>p.y), mode:'markers', marker:{size:4, color:'blue'}}], {title:'После (Эквалайзер)', paper_bgcolor: '#f8fafc'});
}

document.getElementById('snrSlider').oninput = run;
run();
</script>
</body>
</html>
