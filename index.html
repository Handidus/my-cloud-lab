<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud PaaS Lab</title>
    <!-- Подключаем стили Tailwind напрямую из облака (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            background: linear-gradient(-45deg, #3b82f6, #8b5cf6, #ec4899, #10b981);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center font-sans p-4">

    <div class="max-w-2xl w-full bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
        <!-- Шапка с градиентом -->
        <div class="animate-gradient h-32 flex items-center justify-center">
            <h1 class="text-3xl font-black uppercase tracking-widest drop-shadow-md">Cloud Project</h1>
        </div>

        <div class="p-8 text-center">
            <h2 class="text-2xl font-bold mb-4 text-blue-400">Лабораторная работа: Технологии PaaS</h2>
            <p class="text-slate-400 mb-8 leading-relaxed">
                Данная страница развернута в глобальной сети с использованием модели <b>Platform as a Service</b>. 
                Все ресурсы (сервер, сеть, домен) предоставлены облачным провайдером автоматически.
            </p>

            <!-- Интерактивные кнопки -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                <button onclick="alert('Сайт успешно работает в облаке!')" 
                        class="bg-blue-600 hover:bg-blue-500 transition-all py-3 px-6 rounded-xl font-bold shadow-lg shadow-blue-900/20 active:scale-95">
                    Проверить статус
                </button>
                
                <button onclick="location.reload()" 
                        class="bg-slate-700 hover:bg-slate-600 transition-all py-3 px-6 rounded-xl font-bold border border-slate-500 active:scale-95">
                    Обновить данные
                </button>
            </div>

            <!-- Технические индикаторы -->
            <div class="flex items-center justify-center space-x-6 text-sm text-slate-500 border-t border-slate-700 pt-6">
                <div class="flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                    Online
                </div>
                <div class="flex items-center">
                    <span class="w-2 h-2 bg-purple-500 rounded-full mr-2"></span>
                    HTTPS Secured
                </div>
                <div class="flex items-center">
                    <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                    Auto-Deploy
                </div>
            </div>
        </div>
    </div>

</body>
</html>
