<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адаптивный эквалайзер — стабильная версия</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">

<h1 class="text-2xl font-bold mb-4">QPSK + LMS (стабильная версия)</h1>

<label>SNR: <span id="snrVal">10</span> дБ</label>
<input type="range" min="4" max="16" step="1" value="10" id="snrSlider" class="w-full mb-2">

<div class="mb-4">BER: <span id="ber"></span></div>

<div id="achh" style="height:350px"></div>
<div id="berPlot" style="height:350px"></div>
<div id="constBefore" style="height:300px"></div>
<div id="constAfter" style="height:300px"></div>

<script>
// ===== СТАБИЛЬНЫЙ RANDOM (как в MATLAB) =====
let seed = 1;
function rand(){
 seed = (seed * 16807) % 2147483647;
 return (seed - 1) / 2147483646;
}

// ===== 1. Источник =====
function generateBits(N){return Array.from({length:N},()=>rand()>0.5?1:0);}

function qpskMod(bits){
 let s=[];
 for(let i=0;i<bits.length;i+=2){
  s.push({re:bits[i]? -1:1, im:bits[i+1]? -1:1});
 }
 return s;
}

// ===== 2. Канал =====
function getChannelH(){ return [0.5,-0.4,0.9,0.3,-0.5,0.2]; }
function applyChannel(sig){
 const h=getChannelH();
 let out=[];
 for(let i=0;i<sig.length;i++){
  let re=0,im=0;
  for(let j=0;j<h.length;j++){
   if(i-j>=0){
    re+=h[j]*sig[i-j].re;
    im+=h[j]*sig[i-j].im;
   }
  }
  out.push({re,im});
 }
 return out;
}

// ===== 3. Шум =====
function addNoise(sig,snr){
 const snrLin=Math.pow(10,snr/10);
 const noise=1/snrLin;
 return sig.map(s=>({
  re:s.re+Math.sqrt(noise)*(rand()-0.5),
  im:s.im+Math.sqrt(noise)*(rand()-0.5)
 }));
}

// ===== 4. LMS (СТАБИЛЬНЫЙ) =====
function lms(rx, tx, mu=0.02, taps=13){
 let w=new Array(taps).fill(0);
 w[Math.floor(taps/2)]=1;
 let out=[];

 for(let i=taps;i<rx.length;i++){
  let yRe=0,yIm=0;

  for(let j=0;j<taps;j++){
   yRe+=w[j]*rx[i-j].re;
   yIm+=w[j]*rx[i-j].im;
  }

  let dRe,dIm;
  if(i<400){ // увеличенное обучение
    dRe=tx[i].re;
    dIm=tx[i].im;
  } else {
    dRe=yRe>0?1:-1;
    dIm=yIm>0?1:-1;
  }

  let eRe=dRe-yRe;
  let eIm=dIm-yIm;

  for(let j=0;j<taps;j++){
    w[j]+=mu*(eRe*rx[i-j].re+eIm*rx[i-j].im);
  }

  out.push({re:yRe,im:yIm});
 }

 return {out,w};
}

// ===== FFT =====
function fftReal(h){
 let N=128,mag=[];
 for(let k=0;k<N;k++){
  let re=0,im=0;
  for(let n=0;n<h.length;n++){
   let angle=-2*Math.PI*k*n/N;
   re+=h[n]*Math.cos(angle);
   im+=h[n]*Math.sin(angle);
  }
  mag.push(20*Math.log10(Math.sqrt(re*re+im*im)+1e-6));
 }
 return mag;
}

// ===== Демодуляция =====
function demod(sig){
 let bits=[];
 sig.forEach(s=>{
  bits.push(s.re<0?1:0);
  bits.push(s.im<0?1:0);
 });
 return bits;
}

function ber(a,b){
 let e=0;
 for(let i=0;i<b.length;i++) if(a[i]!=b[i]) e++;
 return e/b.length;
}

// ===== ГРАФИКИ =====
function plotACHH(h,w){
 let ch=fftReal(h);
 let eq=fftReal(w);
 let total=ch.map((v,i)=>v+eq[i]);
 let ideal=new Array(ch.length).fill(0);
 let x=ch.map((_,i)=>i);

 Plotly.newPlot('achh',[
  {x,y:ch,name:'Канал'},
  {x,y:eq,name:'Эквалайзер'},
  {x,y:total,name:'ИТОГ'},
  {x,y:ideal,name:'Идеал',line:{dash:'dot'}}
 ],{title:'АЧХ'});
}

function plotBERcurve(){
 let snrArr=[],berArr=[];

 for(let s=4;s<=16;s++){
  seed=1; // фикс для каждого SNR
  let bits=generateBits(1500);
  let tx=qpskMod(bits);
  let ch=applyChannel(tx);
  let noisy=addNoise(ch,s);
  let {out:eq}=lms(noisy,tx);
  let rx=demod(eq);
  let b=ber(bits,rx);

  snrArr.push(s);
  berArr.push(b);
 }

 Plotly.newPlot('berPlot',[
  {x:snrArr,y:berArr,mode:'lines+markers',name:'BER'},
  {x:[6,6],y:[1e-5,1],mode:'lines',name:'6 дБ',line:{dash:'dash'}}
 ],{title:'BER vs SNR',yaxis:{type:'log'}});
}

function plotConst(id,data,title){
 Plotly.newPlot(id,[{
  x:data.map(s=>s.re),
  y:data.map(s=>s.im),
  mode:'markers'
 }],{title});
}

// ===== RUN =====
function run(){
 seed=1;
 let snr=parseFloat(snrSlider.value);
 snrVal.innerText=snr;

 let bits=generateBits(2000);
 let tx=qpskMod(bits);
 let ch=applyChannel(tx);
 let noisy=addNoise(ch,snr);
 let {out:eq,w}=lms(noisy,tx);

 let rxBits=demod(eq);
 let b=ber(bits,rxBits);
 ber.innerText=b.toExponential(2);

 plotACHH(getChannelH(),w);
 plotBERcurve();
 plotConst('constBefore',noisy,'До');
 plotConst('constAfter',eq,'После');
}

snrSlider.oninput=run;
run();
</script>

</body>
</html>
