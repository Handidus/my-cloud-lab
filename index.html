<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMS Equalizer - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">

<div class="max-w-5xl mx-auto bg-slate-800 p-6 rounded-xl border border-slate-700">
    <h1 class="text-xl font-bold mb-4 text-blue-400 text-center">АДАПТИВНОЕ ВЫРАВНИВАНИЕ АЧХ</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 bg-slate-700 p-6 rounded-lg border border-slate-600">
        <div>
            <label class="text-sm">SNR: <span id="snrVal" class="text-yellow-400 font-bold">14</span> дБ</label>
            <input type="range" min="6" max="20" step="1" value="14" id="snrSlider" class="w-full mt-4 h-2 bg-slate-600 rounded-lg cursor-pointer">
        </div>
        <div class="flex flex-col justify-center items-center">
            <p class="text-xs uppercase text-slate-400">Вероятность ошибки (BER):</p>
            <p id="berDisplay" class="text-4xl font-mono text-green-400 font-bold">0.00000</p>
        </div>
    </div>

    <div id="achhPlot" class="w-full bg-slate-50 rounded-lg mb-6" style="height:350px"></div>
    <div id="constAfter" class="w-full bg-slate-50 rounded-lg" style="height:350px"></div>
</div>

<script>
const TAPS = 21; 
const MU = 0.005; 

function run() {
    const snrDb = parseFloat(document.getElementById('snrSlider').value);
    document.getElementById('snrVal').innerText = snrDb;

    // 1. Данные QPSK
    let orig = [];
    for(let i=0; i<5000; i++) {
        orig.push({re: Math.random()>0.5?1:-1, im: Math.random()>0.5?1:-1});
    }

    // 2. Канал (ИСИ) - сделаем его более стабильным
    const h = [0.2, 0.5, 1.0, 0.5, 0.2]; 
    let rx = [];
    for(let i=0; i<orig.length; i++) {
        let re=0, im=0;
        for(let j=0; j<h.length; j++) {
            if(i-j>=0) { re += h[j]*orig[i-j].re; im += h[j]*orig[i-j].im; }
        }
        rx.push({re, im});
    }

    // 3. Шум
    const snrLin = Math.pow(10, snrDb/10);
    const sigma = Math.sqrt(1 / (2 * snrLin));
    rx = rx.map(s => ({
        re: s.re + sigma * (Math.random()*2-1)*1.5,
        im: s.im + sigma * (Math.random()*2-1)*1.5
    }));

    // 4. Эквалайзер
    let w = new Array(TAPS).fill(0);
    w[Math.floor(TAPS/2)] = 1; 
    let eqOut = [];
    
    for(let i=0; i<rx.length; i++) {
        let yRe=0, yIm=0;
        for(let j=0; j<TAPS; j++) {
            if(i-j >= 0) {
                yRe += w[j] * rx[i-j].re;
                yIm += w[j] * rx[i-j].im;
            }
        }

        // Решающее устройство
        let dRe = (i < 2000) ? (orig[i-5] ? orig[i-5].re : 0) : (yRe > 0 ? 1 : -1);
        let dIm = (i < 2000) ? (orig[i-5] ? orig[i-5].im : 0) : (yIm > 0 ? 1 : -1);

        let eRe = dRe - yRe;
        let eIm = dIm - yIm;

        for(let j=0; j<TAPS; j++) {
            if(i-j >= 0) {
                w[j] += MU * (eRe * rx[i-j].re + eIm * rx[i-j].im);
            }
        }
        eqOut.push({re: yRe, im: yIm});
    }

    // 5. ГАРАНТИРОВАННЫЙ РАСЧЕТ BER (с поиском задержки)
    function checkBer(delay) {
        let err = 0;
        let count = 0;
        for(let i=3000; i<4500; i++) {
            if(!orig[i-delay]) continue;
            if((eqOut[i].re > 0 ? 1 : -1) !== orig[i-delay].re) err++;
            if((eqOut[i].im > 0 ? 1 : -1) !== orig[i-delay].im) err++;
            count += 2;
        }
        return err / count;
    }

    // Ищем минимальную ошибку среди возможных задержек (обычно это 1-3 символа)
    let minBer = 1.0;
    for(let d=0; d<10; d++) {
        let current = checkBer(d);
        if(current < minBer) minBer = current;
    }

    document.getElementById('berDisplay').innerText = minBer.toFixed(5);
    document.getElementById('berDisplay').style.color = minBer < 0.01 ? "#4ade80" : "#f87171";

    // 6. Графики
    const fft = (c) => {
        let res = [];
        for(let k=0; k<64; k++) {
            let re=0, im=0;
            for(let n=0; n<c.length; n++) {
                let a = -2*Math.PI*k*n/128;
                re += c[n]*Math.cos(a); im += c[n]*Math.sin(a);
            }
            res.push(20 * Math.log10(Math.sqrt(re*re+im*im)+1e-6));
        }
        return res;
    };

    const hF = fft(h);
    const wF = fft(w);
    const totalF = hF.map((v, i) => v + wF[i]);
    const norm = totalF[0];

    Plotly.newPlot('achhPlot', [
        {y: hF.map(v=>v-norm), name: 'Канал', line: {color: 'red'}},
        {y: wF.map(v=>v), name: 'Эквалайзер', line: {color: 'blue', dash: 'dot'}},
        {y: totalF.map(v=>v-norm), name: 'Результат', line: {color: 'green', width: 4}}
    ], { 
        title: 'АЧХ (Должна быть ровной зеленой)', 
        yaxis: {range: [-15, 5]},
        paper_bgcolor: '#f8fafc', plot_bgcolor: '#f8fafc', margin: {t:30} 
    });

    Plotly.newPlot('constAfter', [{
        x: eqOut.slice(3000).map(s=>s.re), 
        y: eqOut.slice(3000).map(s=>s.im), 
        mode:'markers', marker:{size:3, color:'blue'}
    }], { title: 'Созвездие после выравнивания', paper_bgcolor: '#f8fafc', margin: {t:30} });
}

document.getElementById('snrSlider').oninput = run;
run();
</script>
</body>
</html>
