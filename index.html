<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Исправленный Эквалайзер LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">

<div class="max-w-5xl mx-auto bg-slate-800 p-6 rounded-xl shadow-2xl">
    <h1 class="text-xl font-bold mb-4 text-blue-400">Стабильная модель: SNR 6-13 дБ</h1>
    
    <div class="flex gap-10 mb-6 items-center bg-slate-700 p-4 rounded-lg">
        <div class="w-1/2">
            <label>Отношение сигнал/шум: <span id="snrVal" class="text-yellow-400 font-bold">12</span> дБ</label>
            <input type="range" min="6" max="16" step="1" value="12" id="snrSlider" class="w-full mt-2">
        </div>
        <div class="text-center">
            <p class="text-sm">Текущий BER:</p>
            <p id="berDisplay" class="text-3xl font-mono text-green-400">0.00000</p>
        </div>
    </div>

    <div id="achhPlot" class="w-full bg-white rounded-lg mb-6" style="height:400px"></div>
    <div class="grid grid-cols-2 gap-4">
        <div id="constBefore" class="bg-white rounded-lg" style="height:350px"></div>
        <div id="constAfter" class="bg-white rounded-lg" style="height:350px"></div>
    </div>
</div>

<script>
const TAPS = 31; // Увеличили для лучшего выравнивания
const MU = 0.02; // Оптимальный шаг

function run() {
    const snr = parseFloat(document.getElementById('snrSlider').value);
    document.getElementById('snrVal').innerText = snr;

    // 1. Генерация QPSK
    let symbols = [];
    let orig = [];
    for(let i=0; i<3000; i++) {
        let s = {re: Math.random()>0.5?1:-1, im: Math.random()>0.5?1:-1};
        orig.push(s);
    }

    // 2. Канал (тот самый сложный канал с завалом)
    const h = [0.3, 0.7, 1.0, 0.7, 0.3, -0.1, -0.2];
    let rx = [];
    for(let i=0; i<orig.length; i++) {
        let re=0, im=0;
        for(let j=0; j<h.length; j++) {
            if(i-j>=0) { re += h[j]*orig[i-j].re; im += h[j]*orig[i-j].im; }
        }
        rx.push({re, im});
    }

    // 3. Шум
    const snrLin = Math.pow(10, snr/10);
    const sigma = Math.sqrt(1 / (2 * snrLin));
    rx = rx.map(s => ({
        re: s.re + sigma * (Math.random()*2-1)*1.7,
        im: s.im + sigma * (Math.random()*2-1)*1.7
    }));

    // 4. LMS Эквалайзер (Адаптация)
    let w = new Array(TAPS).fill(0);
    w[Math.floor(TAPS/2)] = 1;
    let eqOut = [];
    
    for(let i=TAPS; i<rx.length; i++) {
        let yRe=0, yIm=0;
        for(let j=0; j<TAPS; j++) {
            yRe += w[j] * rx[i-j].re;
            yIm += w[j] * rx[i-j].im;
        }

        // Обучение (Decision Directed + Training)
        let dRe = i < 1000 ? orig[i].re : (yRe > 0 ? 1 : -1);
        let dIm = i < 1000 ? orig[i].im : (yIm > 0 ? 1 : -1);

        let eRe = dRe - yRe;
        let eIm = dIm - yIm;

        for(let j=0; j<TAPS; j++) {
            w[j] += MU * (eRe * rx[i-j].re + eIm * rx[i-j].im);
        }
        eqOut.push({re: yRe, im: yIm});
    }

    // 5. BER (после сходимости)
    let errors = 0;
    let startIdx = 1200;
    let testData = eqOut.slice(startIdx);
    testData.forEach((s, i) => {
        if((s.re>0?1:-1) !== orig[i+startIdx+TAPS].re) errors++;
        if((s.im>0?1:-1) !== orig[i+startIdx+TAPS].im) errors++;
    });
    document.getElementById('berDisplay').innerText = (errors/(testData.length*2)).toFixed(5);

    // 6. Графики АЧХ
    const getFFT = (coeffs) => {
        let res = [];
        for(let k=0; k<64; k++) {
            let re=0, im=0;
            for(let n=0; n<coeffs.length; n++) {
                let a = -2*Math.PI*k*n/128;
                re += coeffs[n]*Math.cos(a);
                im += coeffs[n]*Math.sin(a);
            }
            res.push(20 * Math.log10(Math.sqrt(re*re+im*im)+1e-6));
        }
        return res;
    };

    const hF = getFFT(h);
    const wF = getFFT(w);
    const totalF = hF.map((v, i) => v + wF[i]);

    Plotly.newPlot('achhPlot', [
        {y: hF, name: 'Канал', line: {color: 'red'}},
        {y: wF, name: 'Эквалайзер', line: {color: 'blue'}},
        {y: totalF, name: 'Итоговая АЧХ', line: {color: 'green', width: 4}}
    ], {title: 'Анализ АЧХ (Результат должен быть плоским)', margin: {t:30}});

    Plotly.newPlot('constBefore', [{x: rx.map(s=>s.re), y: rx.map(s=>s.im), mode:'markers', marker:{size:2, color:'gray'}}], {title:'До'});
    Plotly.newPlot('constAfter', [{x: eqOut.slice(1200).map(s=>s.re), y: eqOut.slice(1200).map(s=>s.im), mode:'markers', marker:{size:2, color:'blue'}}], {title:'После'});
}

document.getElementById('snrSlider').oninput = run;
run();
</script>
</body>
</html>
