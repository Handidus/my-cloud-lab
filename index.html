<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Полная модель эквалайзера</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">

<h1 class="text-2xl font-bold mb-4">QPSK + LMS эквалайзер (полная модель)</h1>

<label>SNR: <span id="snrVal">10</span> дБ</label>
<input type="range" min="4" max="16" step="1" value="10" id="snrSlider" class="w-full">

<div class="mt-2">BER: <span id="ber"></span></div>

<div id="achh" style="height:350px"></div>
<div id="berPlot" style="height:350px"></div>
<div id="constBefore" style="height:300px"></div>
<div id="constAfter" style="height:300px"></div>

<script>
function generateBits(N){return Array.from({length:N},()=>Math.random()>0.5?1:0);}

function qpskMod(bits){
 let s=[];
 for(let i=0;i<bits.length;i+=2){
  s.push({re:bits[i]? -1:1, im:bits[i+1]? -1:1});
 }
 return s;
}

function applyChannel(sig){
 const h=[0.9,0.3,-0.2,0.1];
 let out=[];
 for(let i=0;i<sig.length;i++){
  let re=0,im=0;
  for(let j=0;j<h.length;j++){
   if(i-j>=0){
    re+=h[j]*sig[i-j].re;
    im+=h[j]*sig[i-j].im;
   }
  }
  out.push({re,im});
 }
 return out;
}

function addNoise(sig,snr){
 const snrLin=Math.pow(10,snr/10);
 const noise=1/snrLin;
 return sig.map(s=>({
  re:s.re+Math.sqrt(noise)*(Math.random()-0.5),
  im:s.im+Math.sqrt(noise)*(Math.random()-0.5)
 }));
}

function lms(rx,mu=0.01,taps=5){
 let w=new Array(taps).fill(0);
 w[Math.floor(taps/2)]=1;
 let out=[];
 for(let i=taps;i<rx.length;i++){
  let yRe=0,yIm=0;
  for(let j=0;j<taps;j++){
   yRe+=w[j]*rx[i-j].re;
   yIm+=w[j]*rx[i-j].im;
  }
  let dRe=yRe>0?1:-1;
  let dIm=yIm>0?1:-1;
  let eRe=dRe-yRe;
  let eIm=dIm-yIm;
  for(let j=0;j<taps;j++){
   w[j]+=mu*(eRe*rx[i-j].re+eIm*rx[i-j].im);
  }
  out.push({re:yRe,im:yIm});
 }
 return out;
}

function demod(sig){
 let bits=[];
 sig.forEach(s=>{
  bits.push(s.re<0?1:0);
  bits.push(s.im<0?1:0);
 });
 return bits;
}

function ber(a,b){
 let e=0;
 for(let i=0;i<b.length;i++) if(a[i]!=b[i]) e++;
 return e/b.length;
}

function fftMag(signal){
 let N=128;
 let mag=[];
 for(let k=0;k<N;k++){
  let re=0,im=0;
  for(let n=0;n<N && n<signal.length;n++){
   let angle=-2*Math.PI*k*n/N;
   re+=signal[n].re*Math.cos(angle);
   im+=signal[n].re*Math.sin(angle);
  }
  mag.push(20*Math.log10(Math.sqrt(re*re+im*im)+1e-6));
 }
 return mag;
}

function plotACHH(before,after){
 let x=Array.from({length:before.length},(_,i)=>i);
 Plotly.newPlot('achh',[
  {x,y:before,name:'До эквалайзера'},
  {x,y:after,name:'После эквалайзера'}
 ],{title:'АЧХ канала (до/после)'});
}

function plotBERcurve(){
 let snrArr=[],berArr=[];
 for(let s=4;s<=16;s+=1){
  let bits=generateBits(1000);
  let tx=qpskMod(bits);
  let ch=applyChannel(tx);
  let noisy=addNoise(ch,s);
  let eq=lms(noisy);
  let rx=demod(eq);
  let b=ber(bits,rx);
  snrArr.push(s);
  berArr.push(b);
 }
 Plotly.newPlot('berPlot',[{x:snrArr,y:berArr,mode:'lines+markers'}],{
  title:'BER vs SNR',
  yaxis:{type:'log'}
 });
}

function plotConst(id,data,title){
 Plotly.newPlot(id,[{
  x:data.map(s=>s.re),
  y:data.map(s=>s.im),
  mode:'markers'
 }],{title:title});
}

function run(){
 let snr=parseFloat(snrSlider.value);
 snrVal.innerText=snr;

 let bits=generateBits(2000);
 let tx=qpskMod(bits);
 let ch=applyChannel(tx);
 let noisy=addNoise(ch,snr);
 let eq=lms(noisy);

 let rxBits=demod(eq);
 let b=ber(bits,rxBits);
 ber.innerText=b.toExponential(2);

 let achhBefore=fftMag(noisy);
 let achhAfter=fftMag(eq);
 plotACHH(achhBefore,achhAfter);
 plotBERcurve();
 plotConst('constBefore',noisy,'До эквалайзера');
 plotConst('constAfter',eq,'После эквалайзера');
}

snrSlider.oninput=run;
run();
</script>

</body>
</html>
