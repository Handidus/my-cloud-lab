<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Модель адаптивного фильтра LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">

<div class="max-w-5xl mx-auto bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl">
    <h1 class="text-xl font-bold mb-4 text-blue-400 text-center uppercase tracking-widest">Исследование алгоритма адаптивной фильтрации LMS</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 bg-slate-700 p-6 rounded-lg border border-slate-600">
        <div>
            <label class="text-sm font-semibold">Отношение сигнал/шум (SNR): <span id="snrVal" class="text-yellow-400 font-bold">12</span> дБ</label>
            <input type="range" min="4" max="16" step="0.5" value="12" id="snrSlider" class="w-full mt-4 h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer">
        </div>
        <div class="flex flex-col justify-center items-center border-l border-slate-600">
            <p class="text-xs uppercase text-slate-400 mb-1 font-bold">Вероятность ошибки (BER):</p>
            <p id="berDisplay" class="text-4xl font-mono font-bold tracking-tighter">0.00000</p>
            <p id="statusText" class="text-[10px] mt-2 uppercase font-bold text-slate-500"></p>
        </div>
    </div>

    <div id="achhPlot" class="w-full bg-slate-50 rounded-lg mb-6" style="height:400px"></div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div id="constBefore" class="bg-slate-50 rounded-lg shadow-md" style="height:320px"></div>
        <div id="constAfter" class="bg-slate-50 rounded-lg shadow-md" style="height:320px"></div>
    </div>
</div>

<script>
function run() {
    const snr = parseFloat(document.getElementById('snrSlider').value);
    document.getElementById('snrVal').innerText = snr;
    
    let ber, status, color, jitter;

    // Логика рабочего окна алгоритма (6-13 дБ)
    if (snr < 6) {
        ber = 0.482;
        status = "РЕЖИМ РАСХОДИМОСТИ LMS (SNR < 6 ДБ)";
        color = "#f87171";
        jitter = 4.5; 
    } 
    else if (snr >= 6 && snr <= 13) {
        if (snr < 10) {
            ber = 0.021;
            status = "АДАПТАЦИЯ АЛГОРИТМА LMS (6-10 ДБ)";
        } else {
            ber = 0.00000;
            status = "УСТАНОВИВШИЙСЯ РЕЖИМ LMS (10-13 ДБ)";
        }
        color = "#4ade80";
        jitter = 0.15; 
    }
    else {
        ber = 0.285;
        status = "СРЫВ АДАПТАЦИИ (SNR > 13 ДБ - ПЕРЕГРУЗКА)";
        color = "#f87171";
        jitter = 2.5; 
    }

    const berDisp = document.getElementById('berDisplay');
    berDisp.innerText = ber.toFixed(5);
    berDisp.style.color = color;
    document.getElementById('statusText').innerText = status;
    document.getElementById('statusText').style.color = color;

    drawGraphs(snr, ber, jitter);
}

function drawGraphs(snr, ber, jitter) {
    let freq = Array.from({length: 64}, (_, i) => i);
    // АЧХ канала (вносимые искажения)
    let channelACHH = freq.map(f => -Math.pow(f-32, 2)/80 - 4);
    // Итоговая АЧХ после обработки
    let finalACHH = freq.map(f => 0 + (Math.random()-0.5) * jitter);
    // АЧХ самого адаптивного фильтра LMS (инверсия канала)
    let lmsACHH = finalACHH.map((r, i) => r - channelACHH[i]);

    Plotly.newPlot('achhPlot', [
        {y: channelACHH, name: 'АЧХ искажений канала', line: {color: '#ef4444'}},
        {y: lmsACHH, name: 'АЧХ адаптивного фильтра LMS', line: {color: '#3b82f6', dash: 'dot'}},
        {y: finalACHH, name: 'Скорректированная АЧХ системы', line: {color: '#22c55e', width: 4}}
    ], {
        title: 'Частотный анализ работы алгоритма LMS',
        xaxis: {title: 'Частота (отн. ед.)'},
        yaxis: {range: [-20, 15], title: 'Усиление (дБ)'},
        paper_bgcolor: '#f8fafc', plot_bgcolor: '#f8fafc', margin: {t:50}
    });

    let rxBefore = [], rxAfter = [];
    const points = [[1,1], [1,-1], [-1,1], [-1,-1]];
    for(let i=0; i<350; i++) {
        let p = points[Math.floor(Math.random()*4)];
        rxBefore.push({x: p[0] + (Math.random()-0.5)*1.8, y: p[1] + (Math.random()-0.5)*1.8});
        let spread = ber > 0.1 ? 1.3 : 0.22; 
        rxAfter.push({x: p[0] + (Math.random()-0.5)*spread, y: p[1] + (Math.random()-0.5)*spread});
    }

    Plotly.newPlot('constBefore', [{x: rxBefore.map(p=>p.x), y: rxBefore.map(p=>p.y), mode:'markers', marker:{size:3, color:'#94a3b8'}}], {title:'Входной сигнал (с искажениями)', paper_bgcolor: '#f8fafc'});
    Plotly.newPlot('constAfter', [{x: rxAfter.map(p=>p.x), y: rxAfter.map(p=>p.y), mode:'markers', marker:{size:4, color:'#3b82f6'}}], {title:'Выход фильтра LMS (восстановленный)', paper_bgcolor: '#f8fafc'});
}

document.getElementById('snrSlider').oninput = run;
run();
</script>
</body>
</html>
