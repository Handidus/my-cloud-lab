<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaaS Password Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            background: linear-gradient(-45deg, #3b82f6, #8b5cf6, #ec4899, #10b981);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center font-sans p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
        <!-- Шапка -->
        <div class="animate-gradient h-24 flex items-center justify-center">
            <h1 class="text-2xl font-black uppercase tracking-wider">Secure Pass</h1>
        </div>

        <div class="p-8 text-center">
            <h2 class="text-xl font-bold mb-2 text-blue-400">Генератор паролей</h2>
            <p class="text-slate-400 mb-8 text-sm">Создание надежного 8-символьного ключа прямо в браузере.</p>

            <!-- Поле вывода пароля -->
            <div class="mb-6 p-4 bg-slate-900 rounded-2xl border border-slate-700 min-h-[60px] flex items-center justify-center">
                <span id="passwordOutput" class="text-2xl font-mono tracking-widest text-emerald-400">— — — — — — — —</span>
            </div>

            <!-- Кнопки управления -->
            <div class="flex flex-col gap-3">
                <button onclick="generatePassword()" 
                        class="w-full bg-blue-600 hover:bg-blue-500 transition-all py-4 px-6 rounded-xl font-bold shadow-lg active:scale-95 text-lg">
                    Сгенерировать
                </button>
                
                <button onclick="copyToClipboard()" 
                        class="w-full bg-slate-700 hover:bg-slate-600 transition-all py-3 px-6 rounded-xl font-semibold border border-slate-600 active:scale-95 text-sm">
                    Копировать в буфер
                </button>
            </div>

            <!-- Статус -->
            <div id="statusMessage" class="mt-4 text-xs text-slate-500 opacity-0 transition-opacity">
                Скопировано!
            </div>
        </div>
    </div>

    <script>
        function generatePassword() {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let password = "";
            
            // Честный цикл на 8 итераций
            for (let i = 0; i < 8; i++) {
                const randomIndex = Math.floor(Math.random() * charset.length);
                password += charset[randomIndex];
            }
            
            // Вывод результата
            const output = document.getElementById('passwordOutput');
            output.innerText = password;
            output.classList.add('animate-pulse');
            setTimeout(() => output.classList.remove('animate-pulse'), 500);
        }

        function copyToClipboard() {
            const pass = document.getElementById('passwordOutput').innerText;
            if (pass.includes('—')) return; // Если пароль еще не создан

            navigator.clipboard.writeText(pass).then(() => {
                const msg = document.getElementById('statusMessage');
                msg.classList.replace('opacity-0', 'opacity-100');
                setTimeout(() => msg.classList.replace('opacity-100', 'opacity-0'), 2000);
            });
        }
    </script>
</body>
</html>
